<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BookHub{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
        }
        body {
            margin: 0;
            font-family: "Source Serif 4", "Georgia", serif;
            background: radial-gradient(circle at top, #f3efe4, #f6f2ea 35%, #f9f7f1 70%);
            color: #1b1a17;
        }
        header {
            background: #1f2a3a;
            color: #f8f5ef;
            padding: 24px 0;
        }
        .container {
            width: min(1100px, 92vw);
            margin: 0 auto;
        }
        .brand {
            font-family: "Playfair Display", "Georgia", serif;
            font-size: 28px;
            letter-spacing: 0.5px;
        }
        .brand small {
            display: block;
            font-family: "Source Sans 3", "Helvetica", sans-serif;
            font-size: 14px;
            opacity: 0.75;
        }
        main {
            padding: 32px 0 64px;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 18px 35px rgba(31, 42, 58, 0.08);
        }
        .search-bar {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #d9d4c6;
            font-size: 16px;
        }
        .search-bar button {
            background: #ea8c1b;
            color: #1b1a17;
            border: none;
            border-radius: 10px;
            padding: 12px 22px;
            font-weight: 600;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee6d8;
            text-align: left;
        }
        th {
            font-family: "Source Sans 3", "Helvetica", sans-serif;
            font-size: 13px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #5a5447;
        }
        .highlight {
            background: #fff3da;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: #1f2a3a;
            color: #f8f5ef;
            font-size: 12px;
        }
        .muted {
            color: #6d675c;
        }
        .footer {
            padding: 24px 0 40px;
            color: #6d675c;
            font-size: 13px;
        }
        a {
            color: #1f2a3a;
        }
        @media (max-width: 720px) {
            .search-bar {
                flex-direction: column;
            }
            table, thead, tbody, th, td, tr {
                display: block;
            }
            th {
                display: none;
            }
            td {
                border-bottom: none;
                padding: 8px 0;
            }
            tr {
                border-bottom: 1px solid #eee6d8;
                padding-bottom: 12px;
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="brand">
                BookHub
                <small>MVP</small>
            </div>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <div class="container footer">
        Updated listings will appear as Jump Books data is added.
    </div>
</body>
</html>
